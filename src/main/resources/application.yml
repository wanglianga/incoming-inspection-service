server:
  port: 8080

spring:
  application:
    name: incoming-inspection

  datasource:
    url: jdbc:mysql://localhost:3306/incoming_inspection?useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true&createDatabaseIfNotExist=true
    username: root
    password: root123
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.MySQLDialect

logging:
  level:
    com.factory.inspection: DEBUG
    org.hibernate.SQL: DEBUG
